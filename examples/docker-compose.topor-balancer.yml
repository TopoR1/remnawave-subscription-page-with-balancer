services:
  remnawave-subscription-page-with-balancer:
    build:
      context: ..
      dockerfile: Dockerfile
    image: remnawave-subscription-page-with-balancer:local
    container_name: remnawave-subscription-page-with-balancer
    hostname: remnawave-subscription-page-with-balancer
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '${TOPOR_BALANCER_HOST_BIND:-127.0.0.1}:${TOPOR_BALANCER_HOST_PORT:-3011}:${APP_PORT:-3010}'
    depends_on:
      topor-balancer-postgres:
        condition: service_healthy
    networks:
      - default
      - remnawave-network

  topor-balancer-postgres:
    image: postgres:16-alpine
    container_name: topor-balancer-postgres
    hostname: topor-balancer-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topor_balancer}
      POSTGRES_USER: ${POSTGRES_USER:-topor_balancer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - topor-balancer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  topor-balancer-postgres-data:

networks:
  remnawave-network:
    external: true
    name: ${REMNAWAVE_DOCKER_NETWORK:-remnawave-network}
